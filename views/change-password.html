<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Changer de mot de passe — Batcave</title>
  </head>
  <body>
    <h1>Changer mon mot de passe</h1>

    <form id="change-password-form">
      <label for="oldPassword">Ancien mot de passe</label>
      <input
        type="password"
        id="oldPassword"
        name="oldPassword"
        placeholder="Ancien mot de passe"
        required
      />

      <label for="newPassword">Nouveau mot de passe</label>
      <input
        type="password"
        id="newPassword"
        name="newPassword"
        placeholder="Nouveau mot de passe"
        required
      />

      <!-- Indication UX uniquement : la validation réelle est faite côté serveur. -->
      <small>
        Au moins 12 caractères, dont 1 majuscule, 1 minuscule, 1 chiffre et 1
        caractère spécial.
      </small>

      <button type="submit">Valider</button>
    </form>

    <p id="message"></p>
    <p><a href="/bat-computer">← Retour au Bat-Ordinateur</a></p>

    <!-- Fournit apiFetch() (Retry Pattern : refresh transparent + rejeu). -->
    <script src="/dashboard.js"></script>
    <script>
      const form = document.getElementById("change-password-form");
      const message = document.getElementById("message");

      // Appel de l'API via apiFetch : si l'accessToken a expiré, le refresh
      // et le rejeu sont gérés automatiquement.
      function changePassword(oldPassword, newPassword) {
        return apiFetch("/api/auth/change-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ oldPassword, newPassword }),
        });
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "";
        message.style.color = "";

        const oldPassword = document.getElementById("oldPassword").value;
        const newPassword = document.getElementById("newPassword").value;

        try {
          // apiFetch gère lui-même le refresh transparent + le rejeu sur 401.
          const res = await changePassword(oldPassword, newPassword);

          const data = await res.json().catch(() => null);

          if (res.ok) {
            message.style.color = "green";
            message.textContent =
              (data && data.message) || "Mot de passe modifié avec succès.";
            form.reset();
          } else if (res.status === 401) {
            message.style.color = "red";
            message.textContent =
              "Session expirée, veuillez vous reconnecter.";
          } else {
            message.style.color = "red";
            message.textContent =
              (data && data.error) || "Une erreur est survenue.";
          }
        } catch (err) {
          message.style.color = "red";
          message.textContent = "Impossible de contacter le serveur.";
        }
      });
    </script>
  </body>
</html>
