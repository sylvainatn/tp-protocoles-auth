<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Changer de mot de passe — Batcave</title>
  </head>
  <body>
    <h1>Changer mon mot de passe</h1>

    <form id="change-password-form">
      <label for="oldPassword">Ancien mot de passe</label>
      <input
        type="password"
        id="oldPassword"
        name="oldPassword"
        placeholder="Ancien mot de passe"
        required
      />

      <label for="newPassword">Nouveau mot de passe</label>
      <input
        type="password"
        id="newPassword"
        name="newPassword"
        placeholder="Nouveau mot de passe"
        required
      />

      <!-- Indication UX uniquement : la validation réelle est faite côté serveur. -->
      <small>
        Au moins 12 caractères, dont 1 majuscule, 1 minuscule, 1 chiffre et 1
        caractère spécial.
      </small>

      <button type="submit">Valider</button>
    </form>

    <p id="message"></p>
    <p><a href="/bat-computer">← Retour au Bat-Ordinateur</a></p>

    <script>
      const form = document.getElementById("change-password-form");
      const message = document.getElementById("message");

      // Appel de l'API de changement de mot de passe.
      function changePassword(oldPassword, newPassword) {
        return fetch("/api/auth/change-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          // Envoie les cookies (dont accessToken httpOnly) en same-origin.
          credentials: "same-origin",
          body: JSON.stringify({ oldPassword, newPassword }),
        });
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "";
        message.style.color = "";

        const oldPassword = document.getElementById("oldPassword").value;
        const newPassword = document.getElementById("newPassword").value;

        try {
          let res = await changePassword(oldPassword, newPassword);

          // accessToken expiré (15 s) → on tente un refresh transparent
          // puis on rejoue une seule fois la requête.
          if (res.status === 401) {
            const refresh = await fetch("/auth/refresh", {
              method: "POST",
              credentials: "same-origin",
            });
            if (refresh.ok) {
              res = await changePassword(oldPassword, newPassword);
            }
          }

          const data = await res.json().catch(() => null);

          if (res.ok) {
            message.style.color = "green";
            message.textContent =
              (data && data.message) || "Mot de passe modifié avec succès.";
            form.reset();
          } else if (res.status === 401) {
            message.style.color = "red";
            message.textContent =
              "Session expirée, veuillez vous reconnecter.";
          } else {
            message.style.color = "red";
            message.textContent =
              (data && data.error) || "Une erreur est survenue.";
          }
        } catch (err) {
          message.style.color = "red";
          message.textContent = "Impossible de contacter le serveur.";
        }
      });
    </script>
  </body>
</html>
