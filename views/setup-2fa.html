<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activer la 2FA — Batcave</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        font-family: Arial, sans-serif;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 300px;
      }
      input,
      button {
        padding: 8px;
        font-size: 14px;
      }
      img {
        width: 200px;
        height: 200px;
        align-self: center;
      }
      code {
        word-break: break-all;
        background: #eee;
        padding: 4px;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <form id="credentials-form">
      <h1>Activer la double authentification</h1>

      <label for="username">Nom d'utilisateur</label>
      <input type="text" id="username" name="username" required />

      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" required />

      <button type="submit">Générer le QR Code</button>
    </form>

    <div id="qr-section" class="hidden">
      <p>Scannez ce QR Code avec Google Authenticator (ou équivalent) :</p>
      <img id="qr-image" alt="QR Code 2FA" />
      <p>Secret (secours) : <code id="secret"></code></p>

      <form id="confirm-form">
        <label for="code">Code à 6 chiffres</label>
        <input
          type="text"
          id="code"
          inputmode="numeric"
          pattern="[0-9]{6}"
          maxlength="6"
          placeholder="123456"
          required
        />
        <button type="submit">Confirmer l'activation</button>
      </form>
    </div>

    <p id="message"></p>
    <p><a href="/auth/login">← Retour à la connexion</a></p>

    <script src="/setup-2fa.js"></script>
  </body>
</html>
