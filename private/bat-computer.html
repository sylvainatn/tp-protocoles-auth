<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bat-Ordinateur</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
      }
      /* Arsenal affiché en grille (Phase 3.2) */
      #arsenal {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      .card {
        border: 1px solid #ccc;
        padding: 12px;
        width: 200px;
      }
      .card h3 {
        margin: 0 0 6px;
      }
    </style>
  </head>
  <body>
    <h1>Bat-Ordinateur</h1>
    <p id="welcome">Authentification…</p>
    <button id="logout">Déconnexion</button>

    <h2>Arsenal</h2>
    <div id="arsenal"></div>

    <h2>Nouveau rapport de mission</h2>
    <form id="report-form">
      <input
        type="text"
        id="report-content"
        placeholder="Décrivez votre mission…"
        required
      />
      <button type="submit">Envoyer</button>
    </form>
    <p id="report-message"></p>

    <script src="/bat-computer.js"></script>
  </body>
</html>
